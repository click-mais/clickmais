<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Diagnóstico de Áudio</title>
<style>
body{margin:0;background:#111;color:#0f0;font:13px monospace;padding:10px;}
button{padding:10px 18px;margin:6px 4px;border:none;border-radius:6px;font-size:14px;cursor:pointer;}
#log{white-space:pre-wrap;margin-top:10px;font-size:11px;line-height:1.5;}
</style>
</head>
<body>
<div>
<button onclick="rec()" style="background:#c0392b;color:#fff;">⏺ GRAVAR 3s</button>
<button onclick="play()" style="background:#1a7ab8;color:#fff;">▶ OUVIR</button>
</div>
<div id="log"></div>
<script>
var L=document.getElementById('log');
var _b=null,_bu=null;
function lg(m){L.textContent+='\n'+new Date().toISOString().slice(11,19)+' '+m;}
lg('protocol: '+location.protocol);
lg('origin: '+location.origin);
lg('getUserMedia: '+(!!navigator.mediaDevices&&!!navigator.mediaDevices.getUserMedia));
lg('MediaRecorder: '+(typeof MediaRecorder!=='undefined'));

function rec(){
  lg('--- GRAVAR ---');
  navigator.mediaDevices.getUserMedia({audio:true,video:false})
  .then(function(s){
    lg('mic OK');
    var m='audio/webm;codecs=opus';
    if(!MediaRecorder.isTypeSupported(m))m='audio/webm';
    var r=new MediaRecorder(s,{mimeType:m}),ch=[];
    r.ondataavailable=function(e){if(e.data&&e.data.size>0)ch.push(e.data);};
    r.onstop=function(){
      s.getTracks().forEach(function(t){t.stop();});
      lg('chunks: '+ch.length);
      _b=new Blob(ch,{type:r.mimeType});
      lg('blob: '+_b.size+'b type: '+_b.type);
      if(_bu)URL.revokeObjectURL(_bu);
      _bu=URL.createObjectURL(_b);
      lg('blobURL: '+_bu.slice(0,50));
      lg('Toque OUVIR agora');
    };
    r.start(100);
    lg('Gravando 3s...');
    setTimeout(function(){r.stop();},3000);
  })
  .catch(function(e){lg('ERRO: '+e.name+' '+e.message);});
}

function play(){
  if(!_bu){lg('Grave primeiro');return;}
  lg('--- OUVIR ---');
  var a=new Audio(_bu);
  a.onplay=function(){lg('onplay OK ✅');};
  a.onended=function(){lg('onended OK ✅');};
  a.onerror=function(){lg('onerror code:'+(a.error?a.error.code:'null')+' msg:'+(a.error?a.error.message:''));};
  a.play()
  .then(function(){lg('play() OK');})
  .catch(function(e){lg('play() rejeitado: '+e.name+' '+e.message);});
}
</script>
</body>
</html>
